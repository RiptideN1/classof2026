services:
  - type: web
    name: willdagoat-scramjet
    runtime: node
    plan: starter
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm run build:scramjet
    startCommand: pnpm run start:scramjet
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SESSION_SECRET
        sync: false
