kind = "web"
previewPath = "/"
title = "Scramjet Proxy"
version = "1.0.0"
id = "artifacts/proxy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20290

[services.development]
run = "pnpm --filter @workspace/proxy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/proxy", "run", "build" ]
publicDir = "artifacts/proxy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20290"
BASE_PATH = "/"
